<h1 class="title title  topictitle1" id="ariaid-title1">
Sub-Zone
</h1>
<div class="abstract abstract glossdef">
<p class="p">
A sub-zone is a zone that is included inside the current-zone. E.g. If the current-zone is a CAT then its HMI_CAT or Symbol are its sub-zones.
</p>
